            thTotal: "Totaal",
            thBalance: "Saldo",
            thYear: "Jaar",
            thEndBalance: "Eindsaldo",
            errAmount: "Bedrag moet tussen €1.000 en €5.000.000 liggen.",
            errRate: "Rentevoet moet tussen 0% en 20% liggen.",
            errDuration: (max) => `Looptijd moet tussen 1 en ${max} liggen.`,
            errCapMin: "CAP moet ≥ de rentevoet zijn.",
            errCapMax: "CAP is maximaal 30%.",
            errFloorMax: "FLOOR moet ≤ de rentevoet zijn.",
            errFloorMin: "FLOOR mag niet negatief zijn.",
            errCapFloor: "CAP moet ≥ FLOOR zijn.",
            errDate: "Gebruik vandaag of een datum in het verleden.",
            csvMonthly: "aflossing-maandelijks.csv",
            csvYearly: "aflossing-jaarlijks.csv",
          },
        };

        const LANG_KEY = "steefware-lang";
        let lang = localStorage.getItem(LANG_KEY);
        if (lang !== "nl" && lang !== "en") lang = "en";
        const t = (key, ...args) => {
          const v = I18N[lang][key];
          return typeof v === "function" ? v(...args) : v;
        };

        // ---------- Elements ----------
        const $ = (id) => document.getElementById(id);
        const el = {
          form: $("loanForm"),
          amount: $("amount"),
          rate: $("rate"),
          duration: $("duration"),
          durationUnit: $("durationUnit"),
          typeFixed: $("typeFixed"),
          typeVariable: $("typeVariable"),
          cap: $("cap"),
          floor: $("floor"),
          startDate: $("startDate"),
          status: $("formStatus"),
          results: $("results"),
          kpiMonthly: $("kpiMonthly"),
          kpiInterest: $("kpiInterest"),
          kpiTotal: $("kpiTotal"),
          kpiCap: $("kpiCap"),
          kpiFloor: $("kpiFloor"),
          kpiCapCard: $("kpiCapCard"),
          kpiFloorCard: $("kpiFloorCard"),
          trendRange: $("trendRange"),
          sparkLine: $("sparkLine"),
          sparkFill: $("sparkFill"),
          breakdownBars: $("breakdownBars"),
          tableTitle: $("tableTitle"),
          tableHead: $("tableHead"),
          tableBody: $("tableBody"),
          viewMonthly: $("viewMonthly"),
          viewYearly: $("viewYearly"),
          csvBtn: $("csvBtn"),
          langEn: $("langEn"),
          langNl: $("langNl"),
        };

        // ---------- State ----------
        let rateType = "fixed";
        let view = "monthly";
        let results = null;

        // ---------- Math (identical to the original simulator) ----------
        const round2 = (v) => Math.round((v + Number.EPSILON) * 100) / 100;
        // Belgian convention: effective annual rate -> equivalent monthly rate
        const monthlyRateFromAnnual = (annualPct) => (1 + annualPct / 100) ** (1 / 12) - 1;
        const computePayment = (principal, periodRate, periods) => {
          if (periodRate === 0) return round2(principal / periods);
          const factor = (1 + periodRate) ** periods;
          return round2((principal * periodRate * factor) / (factor - 1));
        };
        const addMonths = (date, months) => {
          const d = new Date(date);
          d.setMonth(d.getMonth() + months);
          return d;
        };

        function calculateLoan(v) {
          const principal = v.amount;
          const months = v.durationUnit === "months" ? v.duration : v.duration * 12;
          const baseMonthlyRate = monthlyRateFromAnnual(v.rate);
          const monthlyPayment = computePayment(principal, baseMonthlyRate, months);

          const capRate = v.type === "variable" ? monthlyRateFromAnnual(v.cap ?? v.rate) : baseMonthlyRate;
          const floorRate = v.type === "variable" ? monthlyRateFromAnnual(v.floor ?? v.rate) : baseMonthlyRate;
          const maxMonthly = computePayment(principal, capRate, months);
          const minMonthly = computePayment(principal, floorRate, months);

          let balance = principal;
          const schedule = [];
          for (let i = 0; i < months; i += 1) {
            let interest = round2(balance * baseMonthlyRate);
            let capital = round2(monthlyPayment - interest);
            let payment = monthlyPayment;
            if (i === months - 1) {
              // Final payment clears rounding residue.
              capital = round2(balance);
              interest = round2(balance * baseMonthlyRate);
              payment = round2(capital + interest);
              balance = 0;
            } else {
              balance = round2(balance - capital);
            }
            schedule.push({
              index: i + 1,
              date: addMonths(v.startDate, i),
              rate: baseMonthlyRate * 100,
              capital,
              interest,
              payment,
              balance,
            });
          }

          const totalInterest = round2(schedule.reduce((s, r) => s + r.interest, 0));
          const totalPaid = round2(schedule.reduce((s, r) => s + r.payment, 0));

          const yearlyMap = {};
          for (const row of schedule) {
            const year = row.date.getFullYear();
            if (!yearlyMap[year]) yearlyMap[year] = { year, capital: 0, interest: 0, payment: 0, endBalance: 0 };
            const y = yearlyMap[year];
            y.capital = round2(y.capital + row.capital);
            y.interest = round2(y.interest + row.interest);
            y.payment = round2(y.payment + row.payment);
            y.endBalance = row.balance;
          }

          return {
            monthlyPayment,
            totalInterest,
            totalPaid,
            schedule,
            yearly: Object.values(yearlyMap).sort((a, b) => a.year - b.year),
            minMonthly,
            maxMonthly,
          };
        }

        // ---------- Formatting ----------
        const fmtCur = (v) =>
          new Intl.NumberFormat(lang === "nl" ? "nl-BE" : "en-GB", {
            style: "currency",
            currency: "EUR",
            maximumFractionDigits: 2,
          }).format(v);
        const fmtDate = (d) => new Intl.DateTimeFormat(lang === "nl" ? "nl-BE" : "en-GB").format(d);

        // ---------- Validation ----------
        function readForm() {
          return {
            amount: Number(el.amount.value),
            rate: Number(el.rate.value),
            duration: Number(el.duration.value),
            durationUnit: el.durationUnit.value,
            type: rateType,
            cap: el.cap.value === "" ? null : Number(el.cap.value),
            floor: el.floor.value === "" ? null : Number(el.floor.value),
            startDate: el.startDate.value,
          };
        }

        function validate(v) {
          const errors = {};
          const durationMax = v.durationUnit === "months" ? 600 : 50;
          if (!Number.isFinite(v.amount) || v.amount < 1000 || v.amount > 5000000) errors.amount = t("errAmount");
          if (!Number.isFinite(v.rate) || v.rate < 0 || v.rate > 20) errors.rate = t("errRate");
          if (!Number.isFinite(v.duration) || v.duration < 1 || v.duration > durationMax)
            errors.duration = t("errDuration", durationMax);
          if (v.type === "variable") {
            if (v.cap != null && v.cap < v.rate) errors.cap = t("errCapMin");
            if (v.cap != null && v.cap > 30) errors.cap = t("errCapMax");
            if (v.floor != null && v.floor > v.rate) errors.floor = t("errFloorMax");
            if (v.floor != null && v.floor < 0) errors.floor = t("errFloorMin");
            if (v.cap != null && v.floor != null && v.cap < v.floor) errors.cap = t("errCapFloor");
          }
          const today = new Date();
          const d = new Date(v.startDate);
          if (Number.isNaN(d.getTime()) || d > today) errors.startDate = t("errDate");
          return errors;
        }

        function showErrors(errors) {
          for (const field of ["amount", "rate", "duration", "cap", "floor", "startDate"]) {
            const msg = $(`err-${field}`);
            const input = el[field];
            if (errors[field]) {
              msg.textContent = errors[field];
              msg.classList.remove("hidden");
              input.classList.add("border-red-600");
            } else {
              msg.classList.add("hidden");
              input.classList.remove("border-red-600");
            }
          }
        }

        // ---------- Rendering ----------
        const ACTIVE = ["bg-black", "text-white"];

        function setToggle(onBtn, offBtn) {
          onBtn.classList.add(...ACTIVE);
          offBtn.classList.remove(...ACTIVE);
        }

        function renderSparkline(schedule) {
          const width = 320, height = 80;
          const balances = schedule.map((r) => r.balance);
          const maxBal = Math.max(...balances, 1);
          const step = width / Math.max(1, balances.length - 1);
          const pts = balances.map((b, i) => `${i === 0 ? "M" : "L"}${(i * step).toFixed(1)},${(height - (b / maxBal) * height).toFixed(1)}`);
          const d = pts.join(" ");
          el.sparkLine.setAttribute("d", d);
          el.sparkFill.setAttribute("d", `${d} L${width},${height} L0,${height} Z`);
          el.trendRange.textContent = `${fmtCur(balances[0])} → ${fmtCur(balances[balances.length - 1])}`;
        }

        function renderBreakdown(yearly) {
          el.breakdownBars.innerHTML = "";
          for (const row of yearly) {
            const total = row.payment || 1;
            const capPct = (row.capital / total) * 100;
            const wrap = document.createElement("div");
            wrap.innerHTML = `
              <div class="flex items-baseline justify-between text-xs font-semibold text-black/70">
                <span class="font-black text-black">${row.year}</span>
                <span>${fmtCur(row.capital)} / ${fmtCur(row.interest)}</span>
              </div>
              <div class="mt-1 flex h-3 overflow-hidden rounded-full border-2 border-black">
                <div class="bg-fuchsia-500" style="width:${capPct}%"></div>
                <div class="flex-1 bg-amber-300"></div>
              </div>`;
            el.breakdownBars.appendChild(wrap);
          }
        }

        function renderTable() {
          if (!results) return;
          const th = (key) => `<th class="px-4 py-3">${t(key)}</th>`;
          const td = (v, extra = "") => `<td class="px-4 py-2 ${extra}">${v}</td>`;

          if (view === "monthly") {
            el.tableTitle.textContent = t("tableMonthly");
            el.tableHead.innerHTML = `<tr>${["thNum","thDate","thRate","thCapital","thInterest","thTotal","thBalance"].map(th).join("")}</tr>`;
            el.tableBody.innerHTML = results.schedule
              .map(
                (r) =>
                  `<tr class="border-t-2 border-black/10">${
                    td(r.index, "text-black/50") +
                    td(fmtDate(r.date)) +
                    td(r.rate.toFixed(4)) +
                    td(fmtCur(r.capital)) +
                    td(fmtCur(r.interest)) +
                    td(fmtCur(r.payment), "font-black") +
                    td(fmtCur(r.balance))
                  }</tr>`
              )
              .join("");
          } else {
            el.tableTitle.textContent = t("tableYearly");
            el.tableHead.innerHTML = `<tr>${["thYear","thCapital","thInterest","thTotal","thEndBalance"].map(th).join("")}</tr>`;
            el.tableBody.innerHTML = results.yearly
              .map(
                (r) =>
                  `<tr class="border-t-2 border-black/10">${
                    td(r.year, "font-black") +
                    td(fmtCur(r.capital)) +
                    td(fmtCur(r.interest)) +
                    td(fmtCur(r.payment), "font-black") +
                    td(fmtCur(r.endBalance))
                  }</tr>`
              )
              .join("");
          }
          setToggle(view === "monthly" ? el.viewMonthly : el.viewYearly, view === "monthly" ? el.viewYearly : el.viewMonthly);
        }

        function renderResults() {
          if (!results) return;
          el.results.classList.remove("hidden");
          el.kpiMonthly.textContent = fmtCur(results.monthlyPayment);
          el.kpiInterest.textContent = fmtCur(results.totalInterest);
          el.kpiTotal.textContent = fmtCur(results.totalPaid);
          const variable = rateType === "variable";
          el.kpiCapCard.classList.toggle("hidden", !variable);
          el.kpiFloorCard.classList.toggle("hidden", !variable);
          if (variable) {
            el.kpiCap.textContent = fmtCur(results.maxMonthly);
            el.kpiFloor.textContent = fmtCur(results.minMonthly);
          }
          renderSparkline(results.schedule);
          renderBreakdown(results.yearly);
          renderTable();
        }

        // ---------- CSV ----------
        function downloadCsv() {
          if (!results) return;
          let header, rows, filename;
          if (view === "monthly") {
            header = [t("thNum"), t("thDate"), t("thRate"), t("thCapital"), t("thInterest"), t("thTotal"), t("thBalance")];
            rows = results.schedule.map((r) =>
              [r.index, fmtDate(r.date), r.rate.toFixed(6), r.capital.toFixed(2), r.interest.toFixed(2), r.payment.toFixed(2), r.balance.toFixed(2)].join(";")
            );
            filename = t("csvMonthly");
          } else {
            header = [t("thYear"), t("thCapital"), t("thInterest"), t("thTotal"), t("thEndBalance")];
            rows = results.yearly.map((r) =>
              [r.year, r.capital.toFixed(2), r.interest.toFixed(2), r.payment.toFixed(2), r.endBalance.toFixed(2)].join(";")
            );
            filename = t("csvYearly");
          }
          const blob = new Blob([`${header.join(";")}\n${rows.join("\n")}`], { type: "text/csv;charset=utf-8;" });
          const link = document.createElement("a");
          link.href = URL.createObjectURL(blob);
          link.download = filename;
          link.click();
          URL.revokeObjectURL(link.href);
        }

        // ---------- Language ----------
        function applyLang() {
          document.documentElement.lang = lang;
          document.querySelectorAll("[data-i18n]").forEach((node) => {
            node.textContent = t(node.dataset.i18n);
          });
          setToggle(lang === "en" ? el.langEn : el.langNl, lang === "en" ? el.langNl : el.langEn);
          if (results) {
            renderResults();
          } else {
            el.status.textContent = t("emptyState");
          }
        }

        function setLang(next) {
          lang = next;
          localStorage.setItem(LANG_KEY, lang);
          applyLang();
        }

        // ---------- Rate type ----------
        function setRateType(next) {
          rateType = next;
          const fixed = rateType === "fixed";
          el.cap.disabled = fixed;
          el.floor.disabled = fixed;
          setToggle(fixed ? el.typeFixed : el.typeVariable, fixed ? el.typeVariable : el.typeFixed);
        }

        // ---------- Events ----------
        el.form.addEventListener("submit", (e) => {
          e.preventDefault();
          const values = readForm();
          const errors = validate(values);
          showErrors(errors);
          if (Object.keys(errors).length) {
            el.status.textContent = t("validation");
            results = null;
            el.results.classList.add("hidden");
            return;
          }
          el.status.textContent = "";
          results = calculateLoan(values);
          renderResults();
        });

        el.durationUnit.addEventListener("change", () => {
          const yearsSelected = el.durationUnit.value === "years";
          el.duration.max = yearsSelected ? 50 : 600;
        });

        el.typeFixed.addEventListener("click", () => setRateType("fixed"));
        el.typeVariable.addEventListener("click", () => setRateType("variable"));
        el.viewMonthly.addEventListener("click", () => { view = "monthly"; renderTable(); });
        el.viewYearly.addEventListener("click", () => { view = "yearly"; renderTable(); });
        el.csvBtn.addEventListener("click", downloadCsv);
        el.langEn.addEventListener("click", () => setLang("en"));
        el.langNl.addEventListener("click", () => setLang("nl"));

        // ---------- Init ----------
        const today = new Date().toISOString().split("T")[0];
        el.startDate.value = today;
        el.startDate.max = today;
        setRateType("fixed");
        setToggle(el.viewMonthly, el.viewYearly);
        applyLang();
      })();
    </script>
  </body>
</html>
